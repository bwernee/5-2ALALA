<ion-content class="confirm-modal">
  <div class="confirm-modal__backdrop">
    <div class="confirm-modal__card" role="dialog" aria-modal="true">
      <div class="confirm-modal__header">
        <h2 class="confirm-modal__title">{{ title }}</h2>
      </div>

      <p class="confirm-modal__message">{{ message }}</p>

      <div class="confirm-modal__actions">
        <ion-button class="app-button app-button-outline" fill="outline" expand="block" (click)="cancel()">
          {{ cancelText }}
        </ion-button>

        <ion-button
          class="app-button app-button-solid"
          [class.danger]="tone === 'danger'"
          expand="block"
          (click)="confirm()">
          {{ confirmText }}
        </ion-button>
      </div>
    </div>
  </div>
</ion-content>
