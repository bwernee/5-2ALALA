<ion-content class="bgcat-content" [scrollY]="false" fullscreen>
  <div class="bgcat-wrap">
    <app-global-header>
      <div gh-left>
        <ion-buttons>
          <ion-button class="back-btn" fill="clear" (click)="goBack()" aria-label="Back">
            <ion-icon name="arrow-back-outline"></ion-icon>
          </ion-button>
        </ion-buttons>
        <div class="welcome-icon" aria-hidden="true">
          <ion-icon name="layers-outline"></ion-icon>
        </div>
      </div>
      <div gh-center>
        <div class="app-header__body">
          <h1 class="app-header__title">{{ pageTitle }}</h1>
          <p class="app-header__subtitle">{{ subtitle }}</p>
        </div>
      </div>
    </app-global-header>

    <div class="panel">
      <h2 class="panel-title">Pick a memory set</h2>
      <div class="btn-grid">
        <ion-button class="big-btn" expand="block" (click)="pickBuiltin('people')">
          <div class="btn-stack">
            <span class="btn-line"><ion-icon name="people-outline"></ion-icon> People</span>
            <span class="btn-meta">{{ counts.people }} cards</span>
          </div>
        </ion-button>
        <ion-button class="big-btn" expand="block" (click)="pickBuiltin('places')">
          <div class="btn-stack">
            <span class="btn-line"><ion-icon name="location-outline"></ion-icon> Places</span>
            <span class="btn-meta">{{ counts.places }} cards</span>
          </div>
        </ion-button>
        <ion-button class="big-btn" expand="block" (click)="pickBuiltin('objects')">
          <div class="btn-stack">
            <span class="btn-line"><ion-icon name="cube-outline"></ion-icon> Objects</span>
            <span class="btn-meta">{{ counts.objects }} cards</span>
          </div>
        </ion-button>
      </div>

      <ng-container *ngIf="userCategories?.length">
        <p class="divider-label">Your categories</p>
        <div class="btn-grid">
          <ion-button
            *ngFor="let c of userCategories"
            class="big-btn secondary"
            expand="block"
            (click)="pickCustom(c.id)">
            <div class="btn-stack">
              <span class="btn-line">{{ c.name }}</span>
              <span class="btn-meta">{{ counts.custom[c.id] || 0 }} cards</span>
            </div>
          </ion-button>
        </div>
      </ng-container>

      <p class="hint">Photos in the set you choose will appear in the game.</p>
    </div>
  </div>
</ion-content>
