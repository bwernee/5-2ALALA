<ion-content class="signup-content" fullscreen>
  <div class="signup-container app-container auth-with-hero">

    <div class="auth-hero-bg" aria-hidden="true">
      <img
        src="assets/landing-welcome-bg.png"
        alt=""
        class="auth-hero-img"
        decoding="async" />
      <div class="auth-hero-overlay"></div>
    </div>

    <div class="header-section">
      <ion-button
        fill="clear"
        class="back-btn"
        (click)="goToLanding()"
        aria-label="Back">
        <ion-icon name="arrow-back-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </div>

    <div class="logo-section">
      <div class="app-logo-container">
        <div class="logo-ring">
          <img src="assets/ALALA_logo.png" alt="ALALA logo" class="app-logo-image" />
        </div>
      </div>
      <h1 class="app-name">ALALA</h1>
      <p class="tagline">Join the Memory Care Family</p>
    </div>

    <div class="signup-form">
      <div class="form-container">
        <h2>Create Account</h2>

        <form class="auth-form" autocomplete="off" novalidate>
          <div class="input-group">
            <ion-item class="custom-input">
              <ion-icon name="person-outline" slot="start"></ion-icon>
              <ion-input
                type="text"
                placeholder="Last name"
                [(ngModel)]="lastName"
                name="lastName"
                autocomplete="off"
                autocorrect="off"
                spellcheck="false">
              </ion-input>
            </ion-item>

            <ion-item class="custom-input">
              <ion-icon name="person-outline" slot="start"></ion-icon>
              <ion-input
                type="text"
                placeholder="First name"
                [(ngModel)]="firstName"
                name="firstName"
                autocomplete="off"
                autocorrect="off"
                spellcheck="false">
              </ion-input>
            </ion-item>

            <ion-item class="custom-input">
              <ion-icon name="call-outline" slot="start"></ion-icon>
              <ion-input
                type="tel"
                inputmode="tel"
                placeholder="Contact number"
                [(ngModel)]="phoneNumber"
                name="phoneNumber"
                autocomplete="off">
              </ion-input>
            </ion-item>

            <ion-item class="custom-input">
              <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
              <ion-input
                type="password"
                placeholder="Password"
                [(ngModel)]="password"
                name="password"
                autocomplete="new-password">
              </ion-input>
            </ion-item>

            <ion-item class="custom-input">
              <ion-icon name="checkmark-circle-outline" slot="start"></ion-icon>
              <ion-input
                type="password"
                placeholder="Confirm password"
                [(ngModel)]="confirmPassword"
                name="confirmPassword"
                autocomplete="new-password">
              </ion-input>
            </ion-item>
          </div>
        </form>

        <ion-button
          expand="block"
          class="signup-btn"
          (click)="signup()"
          [disabled]="isLoading || !lastName || !firstName || !phoneNumber || !password || !confirmPassword">
          <ion-spinner name="crescent" *ngIf="isLoading"></ion-spinner>
          <span *ngIf="!isLoading">Create Account</span>
          <span *ngIf="isLoading">Creating Account...</span>
          <ion-icon name="rocket-outline" slot="end" *ngIf="!isLoading"></ion-icon>
        </ion-button>

        <div class="login-link">
          <p>Already have an account?
            <span class="link-text" (click)="goToLogin()">Sign in here</span>
          </p>
        </div>
      </div>
    </div>
  </div>
</ion-content>
