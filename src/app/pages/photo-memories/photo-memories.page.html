<ion-content class="lavender-content" [scrollY]="false">
  <div class="lavender-container">

    <app-global-header>
      <div gh-left>
        <ion-buttons>
          <ion-button class="back-btn" fill="clear" (click)="goBack()">
            <ion-icon name="arrow-back-outline"></ion-icon>
          </ion-button>
        </ion-buttons>
        <div class="welcome-icon">
          <ion-icon name="images-outline"></ion-icon>
        </div>
      </div>
      <div gh-center>
        <div class="app-header__body">
          <h1 class="app-header__title">Photo Memories</h1>
          <p class="app-header__subtitle">Browse your captured moments</p>
        </div>
      </div>
      <div gh-right>
        <ion-button class="add-btn" fill="clear" *ngIf="!isPatientMode" (click)="goToAddFlashcard()" aria-label="Add Photo">
          <ion-icon name="add-outline"></ion-icon>
        </ion-button>
      </div>
    </app-global-header>

    
    <div class="gallery-container" *ngIf="cards.length > 0">
      
      
      <div class="selection-header" *ngIf="isSelectionMode">
        <div class="selection-controls">
          <ion-button fill="clear" class="cancel-btn" (click)="toggleSelectionMode()">
            <ion-icon name="close" slot="start"></ion-icon>
            Cancel
          </ion-button>
          
          <ion-button fill="clear" class="select-all-btn" (click)="selectAllCards()" [disabled]="selectedCards.size === cards.length">
            <ion-icon name="checkmark-circle" slot="start"></ion-icon>
            Select&nbsp;All
          </ion-button>
          
          <ion-button fill="clear" class="delete-btn" (click)="deleteSelected()" [disabled]="selectedCards.size === 0">
            <ion-icon name="trash" slot="start"></ion-icon>
            Delete
          </ion-button>
        </div>
        
        <div class="selection-count">{{ selectedCards.size }} selected</div>
      </div>

      
      <div class="swipeable-gallery" 
           (swipeleft)="onSwipeLeft()" 
           (swiperight)="onSwipeRight()"
           (touchstart)="onTouchStart($event)"
           (touchmove)="onTouchMove($event)"
           (touchend)="onTouchEnd($event)">
        
        
        <div class="gallery-grid" [style.transform]="'translateX(' + swipeOffset + 'px)'">
          <div
            class="gallery-item"
            *ngFor="let card of cards; let i = index; trackBy: trackByCardId"
            [class.selected]="selectedCards.has(card.id)"
            (click)="isSelectionMode ? toggleCardSelection(card.id) : openDetailView(card, i)">
          
          
          <img [src]="imgSrc(card)" [alt]="card.label || 'Memory'" class="gallery-image" />
        </div>
        </div>
      </div>

    </div>

    
    <ion-fab vertical="bottom" horizontal="end" slot="fixed" *ngIf="!isSelectionMode && cards.length > 0 && !isPatientMode">
      <ion-fab-button class="select-multiple-fab" (click)="toggleSelectionMode()">
        <ion-icon name="checkmark-circle-outline"></ion-icon>
      </ion-fab-button>
    </ion-fab>

    
    <div *ngIf="cards.length === 0" class="empty-state">
      <ion-icon class="empty-icon" name="images-outline"></ion-icon>
      <h2 class="empty-title">No Photos yet</h2>
      <p class="empty-subtitle" *ngIf="!isPatientMode">Tap the + to add a photo.</p>
      <ion-button class="empty-btn" *ngIf="!isPatientMode" (click)="goToAddFlashcard()">
        <ion-icon name="add" slot="start"></ion-icon>
        Add Photo
      </ion-button>
    </div>

  </div>
</ion-content>


<div class="detail-overlay" *ngIf="showDetailModal" (click)="closeDetailView()">
  <button class="nav-btn prev-btn" (click)="prevImage(); $event.stopPropagation()" *ngIf="cards.length > 1">
    <ion-icon name="chevron-back"></ion-icon>
  </button>

  <div class="detail-card" (click)="$event.stopPropagation()"
       (swipeleft)="nextImage()" 
       (swiperight)="prevImage()"
       (touchstart)="onTouchStart($event)"
       (touchmove)="onTouchMove($event)"
       (touchend)="onTouchEnd($event)">
    
    <button class="close-btn" (click)="closeDetailView()">
      <ion-icon name="close"></ion-icon>
    </button>
    
    <h3 class="card-title">{{ selectedCard?.label || 'Memory' }}</h3>
    
    <div class="image-container">
      <img [src]="imgSrc(selectedCard)" [alt]="selectedCard.label || 'Memory'" class="card-image" *ngIf="selectedCard" />
    </div>
    
    <div class="card-info" *ngIf="selectedCard">
      <span class="info-label">Category:</span>
      <span class="info-value">{{ selectedCard.categoryName || selectedCard.category | titlecase }}</span>
    </div>
    
    <div class="card-actions" *ngIf="!isPatientMode">
      <button type="button" class="action-btn edit-btn" (click)="editCard(selectedCard!)">
        <ion-icon name="create-outline"></ion-icon>
        Edit
      </button>
      <button type="button" class="action-btn delete-btn" (click)="deleteCard(selectedCard!, $event)">
        <ion-icon name="trash-outline"></ion-icon>
        Delete
      </button>
    </div>
  </div>

  <button class="nav-btn next-btn" (click)="nextImage(); $event.stopPropagation()" *ngIf="cards.length > 1">
    <ion-icon name="chevron-forward"></ion-icon>
  </button>
</div>

<div class="edit-overlay" *ngIf="showEditModal" (click)="closeEditModal()">
  <div class="edit-card" (click)="$event.stopPropagation()">
    <button class="close-btn" (click)="closeEditModal()">
      <ion-icon name="close"></ion-icon>
    </button>
    
    <h3 class="edit-title">Edit Memory</h3>
    
    <div class="edit-image-section">
      <div class="image-preview">
        <img [src]="editCardImage" alt="Preview" *ngIf="editCardImage" />
        <div class="no-image" *ngIf="!editCardImage">
          <ion-icon name="image-outline"></ion-icon>
        </div>
      </div>
      <button type="button" class="change-image-btn" (click)="triggerImagePicker()">
        <ion-icon name="camera-outline"></ion-icon>
        Change Photo
      </button>
      <input 
        type="file" 
        accept="image/*" 
        class="hidden-input" 
        #editImageInput
        (change)="onEditImageSelected($event)" />
    </div>
    
    <div class="edit-form">
      <label class="form-label">Name</label>
      <input 
        type="text" 
        class="edit-input" 
        [(ngModel)]="editCardLabel" 
        placeholder="Enter name" />
    </div>
    
    <div class="edit-form">
      <label class="form-label">Category</label>
      <select class="edit-select" [(ngModel)]="editCardCategory">
        <option value="people">People</option>
        <option value="places">Places</option>
        <option value="objects">Objects</option>
        <option *ngFor="let cat of customCategories" [value]="cat.id">{{ cat.name }}</option>
      </select>
    </div>
    
    <div class="edit-actions">
      <button type="button" class="action-btn cancel-btn" (click)="closeEditModal()">
        Cancel
      </button>
      <button type="button" class="action-btn save-btn" (click)="saveCardEdit()">
        Save
      </button>
    </div>
  </div>
</div>
